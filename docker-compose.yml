services:
  db:
    image: paradedb/paradedb:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: equibles
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      # -h localhost forces a TCP probe. Without it, pg_isready hits the Unix
      # socket and reports healthy during ParadeDB's init phase — before the
      # init script shuts Postgres down and restarts it on TCP. Apps connect
      # over TCP, so this matches reality.
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d equibles"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  mcp:
    build:
      context: .
      dockerfile: src/Equibles.Mcp.Server/Dockerfile
    ports:
      - "8081:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=equibles;Username=postgres;Password=postgres"
      McpApiKey: ${MCP_API_KEY:-}
      MinimumLogLevel: ${MINIMUM_LOG_LEVEL:-Warning}
    depends_on:
      web:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/Equibles.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=equibles;Username=postgres;Password=postgres"
      ConnectionStrings__TransportConnection: "Host=db;Database=equibles;Username=postgres;Password=postgres"
      # Web boots before worker (worker depends on web). Without this flag the
      # bus has no schema to connect to, fails its health check, and /healthz
      # never goes ready — leaving worker stuck on `web: service_healthy`.
      # Schema creation is idempotent, so it's safe that worker may also run it.
      MassTransit__RunMigration: "true"
      Auth__Username: ${AUTH_USERNAME:-}
      Auth__Password: ${AUTH_PASSWORD:-}
      McpApiKey: ${MCP_API_KEY:-}
      Sec__ContactEmail: ${SEC_CONTACT_EMAIL:-}
      Finra__ClientId: ${Finra__ClientId:-}
      Fred__ApiKey: ${Fred__ApiKey:-}
      MinimumLogLevel: ${MINIMUM_LOG_LEVEL:-Warning}
      CheckForUpdates: ${CHECK_FOR_UPDATES:-true}
      # Same backfill floor the worker uses — historical charts/tables clamp to it.
      Worker__MinSyncDate: ${Worker__MinSyncDate:-}
    volumes:
      - web-keys:/app/keys
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: src/Equibles.Worker.Host/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=equibles;Username=postgres;Password=postgres"
      ConnectionStrings__TransportConnection: "Host=db;Database=equibles;Username=postgres;Password=postgres"
      MassTransit__RunMigration: "true"
      Sec__ContactEmail: ${SEC_CONTACT_EMAIL}
      Embedding__Enabled: "false"
      MinimumLogLevel: ${MINIMUM_LOG_LEVEL:-Warning}
    depends_on:
      web:
        condition: service_healthy

  # Embedding server (opt-in): docker compose --profile embedding up
  embedding:
    image: ollama/ollama:latest
    profiles: ["embedding"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  embedding-pull:
    image: ollama/ollama:latest
    profiles: ["embedding"]
    depends_on:
      embedding:
        condition: service_healthy
    restart: "no"
    entrypoint: ["ollama", "pull", "qwen3-embedding:0.6b"]
    environment:
      OLLAMA_HOST: http://embedding:11434

  # Worker with embeddings enabled (use --profile embedding)
  worker-embedding:
    build:
      context: .
      dockerfile: src/Equibles.Worker.Host/Dockerfile
    profiles: ["embedding"]
    env_file:
      - path: .env
        required: false
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=equibles;Username=postgres;Password=postgres"
      Sec__ContactEmail: ${SEC_CONTACT_EMAIL}
      Embedding__Enabled: "true"
      Embedding__BaseUrl: "http://embedding:11434"
      Embedding__ModelName: "qwen3-embedding:0.6b"
      Embedding__BatchSize: "10"
      MinimumLogLevel: ${MINIMUM_LOG_LEVEL:-Warning}
    depends_on:
      web:
        condition: service_healthy
      embedding:
        condition: service_healthy

  # Stealth browser (opt-in): docker compose --profile stealth up
  #
  # Third-party stealth Chromium (CloakBrowser, https://github.com/CloakHQ/CloakBrowser)
  # used only to render investor-relations sites that answer a plain request with an
  # Incapsula/Akamai bot challenge. The compiled binary is an opaque, anonymous
  # third party under its own BINARY-LICENSE.md ("free to use, no redistribution").
  # Supply-chain caution: keep it isolated to this container, pinned by digest, with
  # no host secrets and no volume mounts; its CDP port is never published to the host.
  # Review the binary licence for your own use before enabling in production. Default
  # off, so the stock stack never pulls it.
  cloakbrowser:
    image: cloakhq/cloakbrowser:0.3.31@sha256:61dee1b490ee8f74b040bc02c3d5384c7f64420b87ccaa26a33f213d07df3f73
    profiles: ["stealth"]
    command: ["cloakserve", "--idle-timeout=300"]
    # Internal-only: the worker reaches it at http://cloakbrowser:9222 over the
    # compose network. Never map this to the host — it is a remote browser endpoint.
    expose:
      - "9222"
    restart: unless-stopped

  # Worker with the stealth fetch fallback enabled (use --profile stealth)
  worker-stealth:
    build:
      context: .
      dockerfile: src/Equibles.Worker.Host/Dockerfile
    profiles: ["stealth"]
    env_file:
      - path: .env
        required: false
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=equibles;Username=postgres;Password=postgres"
      ConnectionStrings__TransportConnection: "Host=db;Database=equibles;Username=postgres;Password=postgres"
      MassTransit__RunMigration: "true"
      Sec__ContactEmail: ${SEC_CONTACT_EMAIL}
      Embedding__Enabled: "false"
      InvestorRelationsDiscovery__StealthFetch__Enabled: "true"
      InvestorRelationsDiscovery__StealthFetch__SidecarUrl: "http://cloakbrowser:9222"
      MinimumLogLevel: ${MINIMUM_LOG_LEVEL:-Warning}
    depends_on:
      web:
        condition: service_healthy
      cloakbrowser:
        condition: service_started

volumes:
  db-data:
  web-keys:
  ollama-data:
