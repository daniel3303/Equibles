version: 2

updates:
  # NuGet packages — versions live in Directory.Packages.props (centralised).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    # Default NuGet commit messages don't include the `build` prefix, which would
    # break the conventional-commits PR-title-lint workflow. Force it here.
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "type: dependencies"
    ignore:
      # SixLabors.ImageSharp 4.x requires a paid commercial license.
      # Stay on the 3.x line, which remains under the Six Labors Split License.
      - dependency-name: "SixLabors.ImageSharp"
        update-types: ["version-update:semver-major"]
      # MassTransit 9.x requires a paid commercial license. Stay on the 8.x
      # line (Apache-2.0) — covers MassTransit, .EntityFrameworkCore and
      # .SqlTransport.PostgreSQL.
      - dependency-name: "MassTransit*"
        update-types: ["version-update:semver-major"]
      # Microsoft.Bcl.Memory is a deliberate direct pin at 9.0.16 that
      # overrides the transitive high-severity advisory NU1903
      # (GHSA-73j8-2gch-69rq). Block major bumps so the 10.x PR can't reopen;
      # 9.0.x patches are still allowed.
      - dependency-name: "Microsoft.Bcl.Memory"
        update-types: ["version-update:semver-major"]
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      entity-framework:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore*"
          - "Pgvector.EntityFrameworkCore"
          - "FlexLabs.EntityFrameworkCore.Upsert"
      aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"
      ai:
        patterns:
          - "Microsoft.Extensions.AI*"
          - "Microsoft.ML.*"
          - "ModelContextProtocol*"
      testing:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
          - "Testcontainers*"
          - "Microsoft.AspNetCore.Mvc.Testing"
          - "Bogus"
          - "FluentAssertions"
          - "Moq"
          - "Microsoft.Playwright"
      serilog:
        patterns:
          - "Serilog*"
      masstransit:
        patterns:
          - "MassTransit*"

  # GitHub Actions referenced from .github/workflows/.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - "type: dependencies"
    groups:
      github-actions:
        patterns:
          - "*"

  # Docker base images in docker-compose.yml / Dockerfiles.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - "type: dependencies"
