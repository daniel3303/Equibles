name: Feature request
description: Propose new functionality or improvements.
title: "[Feature]: "
labels:
  - "type: feature"
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see and why?
      placeholder: "Add support for fetching SEC XBRL financial statements so users can access structured balance sheet data."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this could work? (optional)
      placeholder: "Parse XBRL data from SEC filings and store as structured entities."
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, examples, screenshots, or anything else helpful.
