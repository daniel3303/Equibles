name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday 04:17 UTC — off-peak so we don't race CI.
    - cron: "17 4 * * 1"

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: codeql-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [csharp]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql-config.yml

      - name: Build
        run: |
          dotnet restore Equibles.sln
          dotnet build Equibles.sln --no-restore -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          category: "/language:${{ matrix.language }}"
