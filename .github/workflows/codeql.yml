name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday 04:17 UTC — off-peak so we don't race CI.
    - cron: "17 4 * * 1"

# Cancel superseded runs on the same PR; let main pushes run to completion.
concurrency:
  group: codeql-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [csharp]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          languages: ${{ matrix.language }}
          # build-mode: none makes CodeQL walk the source tree for .cs files and
          # honor the paths-ignore globs in codeql-config.yml. Under the default
          # build mode, paths-ignore is silently ignored for C#, so obj/, bin/
          # and tests/ leaked into the scan despite being listed there.
          build-mode: none
          config-file: ./.github/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          category: "/language:${{ matrix.language }}"
