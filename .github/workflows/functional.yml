name: Functional Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

# Cancel superseded runs on the same PR; let main pushes run to completion.
concurrency:
  group: functional-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  functional:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/Equibles.Web/package-lock.json

      - name: Build frontend assets
        working-directory: src/Equibles.Web
        run: npm ci && npm run build

      - name: Restore
        run: dotnet restore Equibles.sln

      - name: Build functional test project
        run: dotnet build tests/Equibles.FunctionalTests/Equibles.FunctionalTests.csproj --no-restore -c Release

      - name: Install Playwright browsers
        # Pre-install Chromium so the first test doesn't pay the download cost.
        # PlaywrightFixture has a fallback for local runs without this step.
        run: pwsh tests/Equibles.FunctionalTests/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: Run functional tests
        run: dotnet test tests/Equibles.FunctionalTests/Equibles.FunctionalTests.csproj --no-build -c Release --logger "trx;LogFileName=results.trx" --collect:"XPlat Code Coverage" --settings coverage.runsettings --results-directory ./functional-results

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-traces
          path: tests/Equibles.FunctionalTests/bin/Release/net10.0/playwright-traces
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6
        if: success() || failure()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: functional-results/**/coverage.cobertura.xml
          flags: functional
          fail_ci_if_error: false

      - name: Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: success() || failure()
        with:
          name: Functional Test Results
          path: functional-results/**/*.trx
          reporter: dotnet-trx
